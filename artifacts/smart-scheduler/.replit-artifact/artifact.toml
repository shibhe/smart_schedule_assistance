kind = "web"
previewPath = "/"
title = "Smart Scheduler"
version = "1.0.0"
id = "artifacts/smart-scheduler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24610

[services.development]
run = "pnpm --filter @workspace/smart-scheduler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-scheduler", "run", "build" ]
publicDir = "artifacts/smart-scheduler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24610"
BASE_PATH = "/"
